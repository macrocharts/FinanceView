
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #app { padding: 1.5rem 0; max-width: 900px; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -0.02em; }
  .header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

  .search-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .search-row input { flex: 1; }

  .company-header { margin-bottom: 1.5rem; }
  .company-name { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .company-meta { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }

  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .metric-value { font-size: 21px; font-weight: 500; color: var(--color-text-primary); }
  .metric-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }
  .metric-change { font-size: 12px; margin-top: 3px; }
  .pos { color: #2d8a4e; }
  .neg { color: #c0392b; }

  .tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
  .tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); font-weight: 500; }

  .table-wrap { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 2rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--color-background-secondary); color: var(--color-text-secondary); font-weight: 500; padding: 10px 14px; text-align: left; border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; }
  td { padding: 9px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--color-background-secondary); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }

  .chart-container { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 2rem; }
  .section-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1rem; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 180px; margin-top: 8px; }
  .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; }
  .bar-label { font-size: 10px; color: var(--color-text-secondary); text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-val { font-size: 10px; color: var(--color-text-secondary); }

  .filings-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }
  .filing-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .f10k { background: #e6f1fb; color: #0c447c; }
  .f10q { background: #eaf3de; color: #27500a; }
  .filing-date { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
  .filing-desc { font-size: 13px; color: var(--color-text-primary); flex: 1; }
  .filing-link { font-size: 12px; color: #185fa5; text-decoration: none; }
  .filing-link:hover { text-decoration: underline; }

  .filing-filter { display: flex; gap: 8px; margin-bottom: 1rem; }
  .filter-btn { padding: 5px 12px; font-size: 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; cursor: pointer; color: var(--color-text-secondary); }
  .filter-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }

  .loading { display: flex; align-items: center; gap: 10px; padding: 2.5rem 0; color: var(--color-text-secondary); font-size: 14px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--color-border-secondary); border-top-color: var(--color-text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { color: #a32d2d; font-size: 14px; padding: 1rem; background: #fcebeb; border-radius: var(--border-radius-md); border: 0.5px solid #f09595; margin-bottom: 1rem; }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--color-text-tertiary); }
  .empty-state p { font-size: 15px; }
  .empty-state small { font-size: 13px; margin-top: 6px; display: block; }

  .source-note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 0.5rem; margin-bottom: 1.5rem; }
</style>

<div id="app">
  <div class="header">
    <h1>SEC Filing Explorer</h1>
    <p>Financial data from 10-K &amp; 10-Q filings, powered by SEC EDGAR</p>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Enter company name or ticker (e.g. Amazon, AAPL, Tesla)..." />
    <button onclick="runSearch()" id="searchBtn">Search ↗</button>
  </div>

  <div id="mainContent">
    <div class="empty-state">
      <p>Search for any US public company</p>
      <small>Pulls live data from SEC EDGAR 10-K and 10-Q filings</small>
    </div>
  </div>
</div>

<script>
let currentData = null;
let activeTab = 'financials';
let filingFilter = 'all';

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

function setLoading(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="loading"><div class="spinner"></div><span>${msg}</span></div>`;
}

function setError(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="error-box">${msg}</div>`;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function runSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  setLoading('Fetching SEC EDGAR data...');
  document.getElementById('searchBtn').disabled = true;

  const prompt = `You are a financial data assistant. The user wants SEC EDGAR financial data for: "${q}"

Search SEC EDGAR for this company and return a JSON object (no markdown, no backticks, raw JSON only) with this exact structure:

{
  "company": "Full Company Name",
  "ticker": "TICK",
  "cik": "0000000000",
  "exchange": "NASDAQ",
  "industry": "Industry description",
  "metrics": {
    "revenue": [{"period": "FY2024", "value": 123456789000, "form": "10-K"}, ...],
    "netIncome": [{"period": "FY2024", "value": 12345678000, "form": "10-K"}, ...],
    "totalAssets": [{"period": "FY2024", "value": 234567890000, "form": "10-K"}, ...],
    "cash": [{"period": "FY2024", "value": 23456789000, "form": "10-K"}, ...],
    "totalLiabilities": [{"period": "FY2024", "value": 123456000000, "form": "10-K"}, ...],
    "stockholdersEquity": [{"period": "FY2024", "value": 45678900000, "form": "10-K"}, ...],
    "operatingCashFlow": [{"period": "FY2024", "value": 23456789000, "form": "10-K"}, ...],
    "eps": [{"period": "FY2024", "value": 3.45, "form": "10-K"}, ...]
  },
  "recentFilings": [
    {"form": "10-K", "date": "2024-02-01", "description": "Annual Report FY2023", "accessionNumber": "0000000000-24-000001"},
    ...
  ],
  "dataSource": "SEC EDGAR XBRL"
}

Include 4-5 years of annual data per metric (most recent first). Include 8-10 recent filings (10-K and 10-Q only). Use actual values in dollars (not millions). If a value is unavailable use null. Return ONLY the JSON, nothing else.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    const textBlock = data.content?.find(b => b.type === 'text');
    if (!textBlock) throw new Error('No response from AI');

    let raw = textBlock.text.trim();
    raw = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
    const jsonStart = raw.indexOf('{');
    const jsonEnd = raw.lastIndexOf('}');
    if (jsonStart === -1) throw new Error('Could not parse financial data');
    raw = raw.slice(jsonStart, jsonEnd + 1);

    const parsed = JSON.parse(raw);
    currentData = parsed;
    activeTab = 'financials';
    filingFilter = 'all';
    renderDashboard(parsed);
  } catch(e) {
    setError(`Failed to load data: ${e.message}. Try a different company name or ticker.`);
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

function fmtVal(v, isEps) {
  if (v == null) return '—';
  if (isEps) return '$' + parseFloat(v).toFixed(2);
  const abs = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (abs >= 1e12) return sign + '$' + (abs/1e12).toFixed(2) + 'T';
  if (abs >= 1e9) return sign + '$' + (abs/1e9).toFixed(2) + 'B';
  if (abs >= 1e6) return sign + '$' + (abs/1e6).toFixed(1) + 'M';
  return sign + '$' + Intl.NumberFormat('en').format(abs);
}

function pctChg(a, b) {
  if (a == null || b == null || b === 0) return null;
  return ((a - b) / Math.abs(b) * 100).toFixed(1);
}

function metricCard(label, arr, isEps) {
  const latest = arr?.[0];
  const prev = arr?.[1];
  const val = latest?.value;
  const chg = pctChg(val, prev?.value);
  const period = latest?.period || '';
  let chgHtml = '';
  if (chg !== null) {
    const cls = parseFloat(chg) >= 0 ? 'pos' : 'neg';
    const sign = parseFloat(chg) >= 0 ? '+' : '';
    chgHtml = `<div class="metric-change ${cls}">${sign}${chg}% YoY</div>`;
  }
  return `<div class="metric-card">
    <div class="metric-label">${label}</div>
    <div class="metric-value">${fmtVal(val, isEps)}</div>
    ${chgHtml}
    <div class="metric-sub">${esc(period)}</div>
  </div>`;
}

function renderDashboard(d) {
  const m = d.metrics || {};
  document.getElementById('mainContent').innerHTML = `
    <div class="company-header">
      <span class="company-name">${esc(d.company)}</span>
      ${d.ticker ? ` <span style="font-size:13px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:2px 8px;color:var(--color-text-secondary);margin-left:8px;">${esc(d.ticker)}</span>` : ''}
      <div class="company-meta">CIK: ${esc(d.cik)} · ${esc(d.exchange||'')} · ${esc(d.industry||'')}</div>
    </div>

    <div class="metrics-grid">
      ${metricCard('Revenue', m.revenue)}
      ${metricCard('Net Income', m.netIncome)}
      ${metricCard('Total Assets', m.totalAssets)}
      ${metricCard('Cash & Equiv.', m.cash)}
    </div>

    <div class="tabs">
      <div class="tab ${activeTab==='financials'?'active':''}" onclick="switchTab('financials')">Financial Data</div>
      <div class="tab ${activeTab==='chart'?'active':''}" onclick="switchTab('chart')">Revenue Chart</div>
      <div class="tab ${activeTab==='filings'?'active':''}" onclick="switchTab('filings')">Filings</div>
    </div>
    <div id="tabContent"></div>
    <div class="source-note">Data sourced from SEC EDGAR via web search · Values from 10-K and 10-Q filings</div>
  `;
  renderTab();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    const matches = (tab==='financials' && t.textContent.includes('Financial')) ||
                    (tab==='chart' && t.textContent.includes('Chart')) ||
                    (tab==='filings' && t.textContent.includes('Filings'));
    t.classList.toggle('active', matches);
  });
  renderTab();
}

function renderTab() {
  const el = document.getElementById('tabContent');
  if (!el || !currentData) return;
  const m = currentData.metrics || {};

  if (activeTab === 'financials') {
    const sections = [
      { title: 'Income & Cash Flow', keys: ['revenue','netIncome','operatingCashFlow','eps'], labels: ['Revenue','Net Income','Operating Cash Flow','EPS'], isEps: [false,false,false,true] },
      { title: 'Balance Sheet', keys: ['totalAssets','totalLiabilities','stockholdersEquity','cash'], labels: ['Total Assets','Total Liabilities','Stockholders Equity','Cash & Equivalents'], isEps: [false,false,false,false] }
    ];
    let html = '';
    sections.forEach(sec => {
      let rows = '';
      sec.keys.forEach((k, i) => {
        (m[k] || []).slice(0,5).forEach(r => {
          rows += `<tr>
            <td>${sec.labels[i]}</td>
            <td>${esc(r.period)}</td>
            <td><span class="badge ${r.form==='10-K'?'f10k':'f10q'}">${esc(r.form)}</span></td>
            <td class="num">${fmtVal(r.value, sec.isEps[i])}</td>
          </tr>`;
        });
      });
      html += `<p class="section-title" style="margin-top:1rem">${sec.title}</p>
      <div class="table-wrap"><table>
        <thead><tr><th>Metric</th><th>Period</th><th>Form</th><th class="num">Value</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="4" style="color:var(--color-text-tertiary)">No data</td></tr>'}</tbody>
      </table></div>`;
    });
    el.innerHTML = html;

  } else if (activeTab === 'chart') {
    const revArr = (m.revenue || []).filter(r => r.value != null).slice(0,7).reverse();
    const niArr = (m.netIncome || []).filter(r => r.value != null).slice(0,7).reverse();

    const buildBars = (arr, color, negColor) => {
      if (!arr.length) return '<p style="color:var(--color-text-tertiary);font-size:13px;">No data</p>';
      const maxAbs = Math.max(...arr.map(d => Math.abs(d.value)));
      return `<div class="bar-chart">${arr.map(d => {
        const h = Math.max(4, Math.round((Math.abs(d.value) / maxAbs) * 155));
        const c = d.value >= 0 ? color : (negColor || '#c0392b');
        return `<div class="bar-group">
          <div class="bar-val">${fmtVal(d.value)}</div>
          <div class="bar" style="height:${h}px;background:${c}"></div>
          <div class="bar-label">${esc(d.period)}</div>
        </div>`;
      }).join('')}</div>`;
    };

    el.innerHTML = `
      <div class="chart-container">
        <p class="section-title">Annual Revenue</p>
        ${buildBars(revArr, '#378ADD')}
      </div>
      <div class="chart-container">
        <p class="section-title">Annual Net Income</p>
        ${buildBars(niArr, '#2d8a4e', '#c0392b')}
      </div>
    `;

  } else if (activeTab === 'filings') {
    const all = currentData.recentFilings || [];
    const filtered = filingFilter === 'all' ? all : all.filter(f => f.form?.startsWith(filingFilter));
    const rows = filtered.map(f => {
      const acc = (f.accessionNumber||'').replace(/-/g,'');
      const cik = parseInt(currentData.cik || '0');
      const url = acc && cik ? `https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${cik}&type=${encodeURIComponent(f.form)}&dateb=&owner=include&count=40` : null;
      return `<div class="filing-row">
        <span class="badge ${f.form==='10-K'?'f10k':'f10q'}">${esc(f.form)}</span>
        <span class="filing-desc">${esc(f.description||'')}</span>
        <span class="filing-date">${esc(f.date||'')}</span>
        ${url ? `<a class="filing-link" href="${url}" target="_blank">EDGAR ↗</a>` : ''}
      </div>`;
    }).join('') || '<p style="color:var(--color-text-tertiary);font-size:13px;">No filings found</p>';

    el.innerHTML = `
      <div class="filing-filter">
        <button class="filter-btn ${filingFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
        <button class="filter-btn ${filingFilter==='10-K'?'active':''}" onclick="setFilter('10-K')">10-K Annual</button>
        <button class="filter-btn ${filingFilter==='10-Q'?'active':''}" onclick="setFilter('10-Q')">10-Q Quarterly</button>
      </div>
      <div class="filings-list">${rows}</div>`;
  }
}

function setFilter(f) {
  filingFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active',
      (f==='all' && b.textContent==='All') ||
      (f==='10-K' && b.textContent==='10-K Annual') ||
      (f==='10-Q' && b.textContent==='10-Q Quarterly'));
  });
  renderTab();
}
</script>
